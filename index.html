<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Что происходило — упражнение</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#16151f;
    --ink-2:#5a5a6b;
    --muted:#a3a3b0;
    --surface-2:#f3f2f7;
    --surface-3:#e6e4ee;
    --line:rgba(22,21,40,.07);
    --accent:#6c4df2;
    --accent-2:#9a7bff;
    --accent-soft:rgba(108,77,242,.14);
    --play:#ff2d55;
    --play-2:#ff5d7c;
    --ok:#16b46b;
    --err:#f0445b;
    --r-card:26px;
    --r-btn:18px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Onest",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 80% at 50% 0%, #efeaff 0%, #f6f4fb 45%, #eef0f8 100%);
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  .app{
    position:relative;
    max-width:440px;
    margin:0 auto;
    min-height:100dvh;
    background:var(--bg);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    padding-top:env(safe-area-inset-top);
  }
  @media (min-width:520px){
    body{padding:28px 0;}
    .app{
      min-height:auto;
      height:calc(100dvh - 56px);
      border-radius:34px;
      box-shadow:0 40px 90px -40px rgba(40,30,90,.45), 0 0 0 1px rgba(22,21,40,.04);
    }
  }

  /* ---------- screens ---------- */
  .screen{display:none;flex-direction:column;flex:1;min-height:0;}
  .screen.active{display:flex;animation:fade .3s both;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}

  .scroll{
    flex:1;
    overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    padding-bottom:8px;
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:grid;grid-template-columns:1fr auto 1fr;align-items:center;
    padding:14px 14px 4px;
  }
  .back{
    justify-self:start;
    display:inline-flex;align-items:center;gap:3px;
    border:none;background:transparent;cursor:pointer;
    color:var(--accent);font-family:inherit;font-weight:600;font-size:15px;
    padding:7px 9px;border-radius:11px;
  }
  .back:active{background:var(--accent-soft);}
  .back svg{width:19px;height:19px;}
  .tb-title{justify-self:center;font-weight:700;font-size:15px;color:var(--ink-2);}

  /* ---------- chooser ---------- */
  .chooser .scroll{padding:0 20px;}
  .lead{padding:40px 4px 4px;}
  .lead h1{margin:0 0 8px;font-size:28px;font-weight:800;letter-spacing:-.02em;}
  .lead p{margin:0 0 26px;color:var(--ink-2);font-size:15px;line-height:1.5;}
  .pick{display:flex;flex-direction:column;gap:16px;}
  .pick-card{
    display:flex;align-items:center;gap:16px;text-align:left;
    border:1px solid var(--line);background:#fff;border-radius:24px;
    padding:20px;cursor:pointer;font-family:inherit;
    box-shadow:0 18px 38px -24px rgba(50,35,110,.34);
    transition:transform .14s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .pick-card:active{transform:scale(.985);}
  .pick-card:hover{border-color:rgba(108,77,242,.35);}
  .mini{
    flex:0 0 auto;width:64px;height:64px;border-radius:18px;
    background:var(--accent-soft);display:grid;place-items:center;
  }
  .mini span{
    font-size:31px;font-weight:800;line-height:1;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .pc-body{flex:1;min-width:0;}
  .pc-title{font-weight:800;font-size:18px;color:var(--ink);margin-bottom:4px;}
  .pc-desc{font-size:13.5px;color:var(--ink-2);line-height:1.45;}
  .chev{flex:0 0 auto;color:var(--muted);}
  .chev svg{width:22px;height:22px;display:block;}

  /* ---------- audio player ---------- */
  .player{display:flex;align-items:center;gap:15px;padding:18px 20px 10px;}
  .play{
    flex:0 0 auto;width:60px;height:60px;border:none;border-radius:50%;
    background:linear-gradient(135deg,var(--play-2),var(--play));
    color:#fff;cursor:pointer;display:grid;place-items:center;
    box-shadow:0 14px 26px -10px rgba(255,45,85,.55);
    transition:transform .14s ease;
  }
  .play:active{transform:scale(.93);}
  .play svg{width:24px;height:24px;display:block;}
  .play .ic-pause{display:none;}
  .play.is-playing .ic-play{display:none;}
  .play.is-playing .ic-pause{display:block;}
  .wave{flex:1;display:flex;align-items:center;gap:3px;height:40px;}
  .wave .bar{
    flex:1;min-width:2px;border-radius:3px;background:var(--surface-3);
    height:34%;transform-origin:center;transition:background .25s ease;
  }
  .wave .bar.played{background:var(--accent);}
  .wave.is-playing .bar{animation:eq .85s ease-in-out infinite;}
  @keyframes eq{0%,100%{transform:scaleY(.55);}50%{transform:scaleY(1);}}
  .time{
    flex:0 0 auto;font-weight:600;font-size:14px;color:var(--muted);
    min-width:40px;text-align:right;font-variant-numeric:tabular-nums;
  }

  /* ---------- section title ---------- */
  .title{margin:18px 0 16px;text-align:center;font-size:25px;font-weight:800;letter-spacing:-.01em;}
  .block{animation:rise .5s both;}
  .block.b1{animation-delay:.06s;}
  .block.b2{animation-delay:.12s;}

  /* ---------- INTERFACES 1 & 3: carousel ---------- */
  .carousel{
    display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;scroll-padding-left:20px;
    padding:4px 20px 6px;scrollbar-width:none;
  }
  .carousel::-webkit-scrollbar{display:none;}
  .card{
    position:relative;flex:0 0 calc(100% - 58px);scroll-snap-align:start;
    background:#fff;border:1px solid var(--line);border-radius:var(--r-card);
    padding:30px 20px 26px;min-height:218px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    box-shadow:0 16px 36px -20px rgba(50,35,110,.3);
    transition:outline-color .25s ease;outline:2px solid transparent;outline-offset:-2px;
  }
  .card.answered{outline-color:var(--accent);}
  .card.correct{outline-color:var(--ok);}
  .card.wrong{outline-color:var(--err);}
  .badge{
    position:absolute;top:16px;left:16px;width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    color:#fff;font-weight:800;font-size:16px;display:grid;place-items:center;
    box-shadow:0 8px 16px -6px var(--accent-soft);
  }
  .badge .tick{
    position:absolute;right:-5px;bottom:-5px;width:18px;height:18px;border-radius:50%;
    background:var(--ok);color:#fff;display:none;place-items:center;border:2px solid #fff;font-size:10px;
  }
  .card.answered .badge .tick{display:grid;}
  .glyph{width:90px;height:90px;border-radius:24px;background:var(--surface-2);display:grid;place-items:center;font-size:44px;line-height:1;}
  .phrase{font-size:21px;font-weight:700;text-align:center;letter-spacing:-.01em;}

  .dots{display:flex;justify-content:center;gap:8px;margin-top:18px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--surface-3);border:none;padding:0;cursor:pointer;transition:width .28s ease, background .28s ease;}
  .dot.active{width:24px;border-radius:999px;background:var(--accent);}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;}
  .opt{
    appearance:none;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);
    font-family:inherit;font-weight:600;font-size:16px;line-height:1.25;
    padding:16px 12px;border-radius:var(--r-btn);min-height:58px;cursor:pointer;
    transition:transform .12s ease, background .22s ease, color .22s ease, box-shadow .22s ease, border-color .22s ease;
  }
  .opt:active{transform:scale(.97);}
  .opt.is-selected{
    background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#fff;border-color:transparent;
    box-shadow:0 14px 26px -12px var(--accent-soft);
  }
  .opt.is-used{opacity:.35;cursor:not-allowed;pointer-events:none;}
  .opt.opt-bw{display:flex;align-items:center;justify-content:center;gap:6px;}
  .opt-ltr{
    flex:0 0 auto;width:22px;height:22px;border-radius:50%;
    background:var(--accent);color:#fff;
    font-size:11px;font-weight:800;display:grid;place-items:center;
  }
  .opt.is-selected .opt-ltr{background:rgba(255,255,255,.3);}

  .card.is-active{background:rgba(108,77,242,.05);}

  /* ---------- INTERFACE 4: list + dropdown ---------- */
  .s2-head{padding:16px 20px 10px;font-weight:800;font-size:21px;letter-spacing:-.01em;}
  .qlist{display:flex;flex-direction:column;gap:14px;padding:0 16px;}
  .qitem{
    border:1px solid var(--line);background:#fff;border-radius:22px;padding:12px;
    box-shadow:0 14px 30px -22px rgba(50,35,110,.3);
    transition:outline-color .25s ease;outline:2px solid transparent;outline-offset:-2px;
  }
  .qitem.correct{outline-color:var(--ok);}
  .qitem.wrong{outline-color:var(--err);}
  .qcard{display:flex;align-items:center;gap:14px;padding:6px 6px 12px;}
  .glyph2{position:relative;flex:0 0 auto;width:54px;height:54px;border-radius:16px;background:var(--surface-2);display:grid;place-items:center;font-size:27px;line-height:1;}
  .badge2{
    position:absolute;top:-7px;left:-7px;width:24px;height:24px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#fff;
    font-weight:800;font-size:12px;display:grid;place-items:center;border:2px solid #fff;
  }
  .phrase2{font-weight:700;font-size:17px;line-height:1.3;letter-spacing:-.01em;}

  .dd{position:relative;}
  .dd-trigger{
    width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--surface-2);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;font-family:inherit;font-weight:600;font-size:15px;color:var(--ink);
    cursor:pointer;transition:border-color .2s ease, background .2s ease;
  }
  .dd-trigger.placeholder{color:var(--muted);font-weight:500;}
  .dd.open .dd-trigger{border-color:var(--accent);background:#fff;}
  .chev2{flex:0 0 auto;color:var(--muted);transition:transform .25s ease, color .2s ease;}
  .dd.open .chev2{transform:rotate(180deg);color:var(--accent);}
  .dd-panel{overflow:hidden;max-height:0;transition:max-height .28s ease;}
  .dd.open .dd-panel{max-height:420px;}
  .dd-panel-inner{margin-top:8px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:4px;display:flex;flex-direction:column;}
  .dd-opt{
    appearance:none;border:none;background:transparent;text-align:center;
    font-family:inherit;font-weight:600;font-size:15px;color:var(--ink);
    padding:13px 10px;border-radius:10px;cursor:pointer;transition:background .15s ease, color .15s ease;
  }
  .dd-opt + .dd-opt{position:relative;}
  .dd-opt + .dd-opt::before{content:"";position:absolute;left:14px;right:14px;top:0;height:1px;background:var(--line);}
  .dd-opt:active{background:var(--surface-2);}
  .dd-opt.sel{background:var(--accent-soft);color:var(--accent);}
  .dd-opt.sel::before,.dd-opt.sel + .dd-opt::before{display:none;}

  /* ---------- footer / check ---------- */
  .footer{flex:0 0 auto;padding:14px 20px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(to top,#fff 62%,rgba(255,255,255,0));}
  .check{
    width:100%;border:none;cursor:pointer;border-radius:var(--r-btn);padding:18px;
    font-family:inherit;font-weight:800;font-size:18px;color:#fff;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    box-shadow:0 18px 32px -14px var(--accent-soft);transition:transform .12s ease;
  }
  .check:active{transform:scale(.985);}
  .check.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}
  .result{text-align:center;font-weight:600;font-size:14px;margin-top:11px;min-height:18px;color:var(--muted);}
  .result.ok{color:var(--ok);}
  .result.warn{color:var(--play);}

  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

          </button>
        </div>
      </div>
    </section>

    <!-- ============ SCREEN 1: CAROUSEL + BADGE OPTIONS ============ -->

      <div class="topbar">
        <button class="back" type="button" data-nav="chooser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Интерфейсы

        <span class="tb-title">Интерфейс 1</span>

      <div class="scroll">
        <section class="player">

            <svg class="ic-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.4"/><rect x="13.5" y="5" width="4" height="14" rx="1.4"/></svg>

      <div class="footer">

    <!-- ============ SCREEN 3: CAROUSEL + OPTIONS LIST ============ -->

      <div class="topbar">
        <button class="back" type="button" data-nav="chooser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>

        </button>
        <span class="tb-title">Интерфейс 3</span>

    <!-- ============ SCREEN 4: LIST + DROPDOWN ============ -->
    <section class="screen" id="screen4">
      <div class="topbar">
        <button class="back" type="button" data-nav="chooser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Интерфейсы
        </button>
        <span class="tb-title">Интерфейс 4</span>
      </div>
      <div class="scroll">
        <section class="player">
          <button class="play" aria-label="Воспроизвести">
            <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.74l-11-6.5A1 1 0 0 0 8 5.5Z"/></svg>

        <h2 class="s2-head">Ситуации</h2>

      </div>
      <div class="footer">
        <button class="check" type="button">Проверить</button>
        <div class="result"></div>
      </div>
    </section>

  </main>

<script>
(function(){
  "use strict";

  /* =========================================================
     ДАННЫЕ — меняй здесь. Все интерфейсы берут контент отсюда.
     answer = правильный человек для этой ситуации.
     ========================================================= */
  var SITUATIONS = [
    { letter:"A", icon:"📋", text:"Читала список",            answer:"Ника" },
    { letter:"B", icon:"🎉", text:"Отнёс гирлянды в гостиную", answer:"Тёма" },
    { letter:"C", icon:"🥤", text:"Уронил бумажные стаканчики", answer:"Марк" },
    { letter:"D", icon:"🪑", text:"Отнёс стул в багажник",      answer:"Официант" },
    { letter:"E", icon:"🍽️", text:"Накрывала на стол",          answer:"Девушка с фотоаппаратом" }
  ];
  var PEOPLE = ["Марк","Официант","Ника","Лера","Тёма","Девушка с фотоаппаратом"];
  var TOTAL = SITUATIONS.length;

  function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
  function fmt(s){ var m=Math.floor(s/60), ss=s%60; return m+":"+(ss<10?"0":"")+ss; }

  /* ---------------- audio player (демо, без файла) ---------------- */
  var players = [];
  function initPlayer(screen){
    var playBtn = screen.querySelector(".play");
    var wave    = screen.querySelector(".wave");
    var timeEl  = screen.querySelector(".time");
    var BARS=42, bars=[];
    for (var i=0;i<BARS;i++){
      var b=document.createElement("span"); b.className="bar";
      var h=24+Math.round((Math.sin(i*1.7)*0.5+0.5)*60+(i%5)*4);
      b.style.height=Math.min(100,h)+"%";
      b.style.animationDelay=(i*0.035).toFixed(2)+"s";
      wave.appendChild(b); bars.push(b);
    }
    var DURATION=120, cur=0, timer=null;
    function paint(){
      var played=Math.round(cur/DURATION*BARS);
      for (var i=0;i<BARS;i++) bars[i].classList.toggle("played", i<played);
      timeEl.textContent=fmt(cur);
    }
    function stop(){ clearInterval(timer); timer=null; playBtn.classList.remove("is-playing"); wave.classList.remove("is-playing"); playBtn.setAttribute("aria-label","Воспроизвести"); }
    playBtn.addEventListener("click", function(){
      if (timer){ stop(); return; }
      if (cur>=DURATION) cur=0;
      playBtn.classList.add("is-playing"); wave.classList.add("is-playing"); playBtn.setAttribute("aria-label","Пауза");
      timer=setInterval(function(){
        cur++; paint();
        if (cur>=DURATION){ paint(); stop(); cur=0; setTimeout(paint,400); }
      },1000);
    });
    paint();
    return { stop:stop };
  }
  function stopAllPlayers(){ players.forEach(function(p){ p.stop(); }); }

  /* ---------------- INTERFACE 1: carousel + badge options ---------------- */
  function initScreen1(root){
    var carousel = root.querySelector(".carousel");
    var dotsWrap = root.querySelector(".dots");
    var optsWrap = root.querySelector(".options");
    var checkBtn = root.querySelector(".check");
    var resultEl = root.querySelector(".result");
    var answers={}, current=0;

    carousel.innerHTML = SITUATIONS.map(function(s,i){
      return '<article class="card" data-index="'+i+'">'
        + '<span class="badge">'+s.letter+'<span class="tick">✓</span></span>'
        + '<span class="glyph">'+s.icon+'</span>'
        + '<span class="phrase">'+s.text+'</span></article>';
    }).join("");
    var cards=[].slice.call(carousel.querySelectorAll(".card"));

    dotsWrap.innerHTML = SITUATIONS.map(function(s,i){
      return '<button class="dot'+(i===0?' active':'')+'" aria-label="Ситуация '+(i+1)+'"></button>';
    }).join("");
    var dots=[].slice.call(dotsWrap.querySelectorAll(".dot"));
    dots.forEach(function(dot,i){ dot.addEventListener("click", function(){ scrollToCard(i); }); });

    optsWrap.innerHTML = PEOPLE.map(function(p){
      return '<button class="opt opt-bw" type="button" data-person="'+p+'">'
        + '<span class="opt-name">'+p+'</span>'
        + '<span class="opt-ltr" hidden></span>'
        + '</button>';
    }).join("");
    var opts=[].slice.call(optsWrap.querySelectorAll(".opt"));

    function step(){
      if (!cards[0]) return 1;
      var gap=parseFloat(getComputedStyle(carousel).gap)||14;
      var w=cards[0].getBoundingClientRect().width;
      return (w||1)+gap;
    }
    function scrollToCard(i){ carousel.scrollTo({ left:i*step(), behavior:"smooth" }); }
    function paintOptions(){
      var personToCard={};
      Object.keys(answers).forEach(function(k){ personToCard[answers[k]]=parseInt(k,10); });
      opts.forEach(function(btn){
        var person=btn.getAttribute("data-person");
        var on=answers[current]===person;
        var cardIdx=personToCard[person];
        btn.classList.toggle("is-selected", on);
        var ltr=btn.querySelector(".opt-ltr");
        if (cardIdx!==undefined){ ltr.textContent=SITUATIONS[cardIdx].letter; ltr.hidden=false; }
        else { ltr.hidden=true; }
        btn.setAttribute("aria-pressed", on?"true":"false");
      });
    }
    function setActive(i){
      if (i===current){ paintOptions(); return; }
      current=i;
      dots.forEach(function(d,n){ d.classList.toggle("active", n===i); });
      paintOptions();
    }
    function updateCheckLabel(){
      var n=Object.keys(answers).length;
      checkBtn.textContent=(n>0&&n<TOTAL)?("Проверить · "+n+"/"+TOTAL):"Проверить";
    }

    opts.forEach(function(btn){
      btn.setAttribute("aria-pressed","false");
      btn.addEventListener("click", function(){
        var person=btn.getAttribute("data-person");
        if (answers[current]===person){
          delete answers[current];
          cards[current].classList.remove("answered","correct","wrong");
          resultEl.textContent=""; resultEl.className="result";
          paintOptions(); updateCheckLabel(); return;
        }
        Object.keys(answers).forEach(function(k){
          if (answers[k]===person){
            delete answers[k];
            cards[parseInt(k,10)].classList.remove("answered","correct","wrong");
          }
        });
        answers[current]=person;
        cards[current].classList.add("answered");
        cards[current].classList.remove("correct","wrong");
        resultEl.textContent=""; resultEl.className="result";
        paintOptions(); updateCheckLabel();
        if (Object.keys(answers).length<TOTAL){
          for (var k=1;k<=TOTAL;k++){
            var nx=(current+k)%TOTAL;
            if (answers[nx]===undefined){ (function(t){ setTimeout(function(){ scrollToCard(t); },260); })(nx); break; }
          }
        }
      });
    });

    var raf=null;
    carousel.addEventListener("scroll", function(){
      if (raf) return;
      raf=requestAnimationFrame(function(){
        raf=null;
        setActive(clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1));
      });
    }, {passive:true});

    checkBtn.addEventListener("click", function(){
      if (Object.keys(answers).length<TOTAL){
        checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
        resultEl.textContent="Ответьте на все ситуации"; resultEl.className="result warn"; return;
      }
      var correct=0;
      cards.forEach(function(card,i){
        var ok=answers[i]===SITUATIONS[i].answer; if (ok) correct++;
        card.classList.toggle("correct", ok); card.classList.toggle("wrong", !ok);
      });
      resultEl.textContent=(correct===TOTAL)?"Отлично! Все ответы верны 🎉":("Верно: "+correct+" из "+TOTAL);
      resultEl.className="result "+(correct===TOTAL?"ok":"warn");
    });

    return { refresh:function(){ setActive(clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1)); paintOptions(); } };
  }

  /* ---------------- INTERFACE 2: carousel + badge options (click card to activate) ---------------- */
  function initScreen2(root){
    var carousel = root.querySelector(".carousel");
    var dotsWrap = root.querySelector(".dots");
    var optsWrap = root.querySelector(".options");
    var checkBtn = root.querySelector(".check");

    var answers={}, current=0, selected=null;

    carousel.innerHTML = SITUATIONS.map(function(s,i){

    var dots=[].slice.call(dotsWrap.querySelectorAll(".dot"));
    dots.forEach(function(dot,i){ dot.addEventListener("click", function(){ scrollToCard(i); }); });

    optsWrap.innerHTML = PEOPLE.map(function(p){
      return '<button class="opt opt-bw" type="button" data-person="'+p+'">'
        + '<span class="opt-name">'+p+'</span>'
        + '<span class="opt-ltr" hidden></span>'

    }).join("");
    var opts=[].slice.call(optsWrap.querySelectorAll(".opt"));

    function step(){
      if (!cards[0]) return 1;
      var gap=parseFloat(getComputedStyle(carousel).gap)||14;
      var w=cards[0].getBoundingClientRect().width;
      return (w||1)+gap;
    }
    function scrollToCard(i){ carousel.scrollTo({ left:i*step(), behavior:"smooth" }); }
    function paintCards(){
      cards.forEach(function(card,i){
        card.classList.toggle("is-active", i===selected);
      });
    }
    function paintOptions(){
      var personToCard={};
      Object.keys(answers).forEach(function(k){ personToCard[answers[k]]=parseInt(k,10); });
      opts.forEach(function(btn){
        var person=btn.getAttribute("data-person");
        var on=selected!==null && answers[selected]===person;
        var cardIdx=personToCard[person];
        btn.classList.toggle("is-selected", on);
        var ltr=btn.querySelector(".opt-ltr");
        if (cardIdx!==undefined){ ltr.textContent=SITUATIONS[cardIdx].letter; ltr.hidden=false; }
        else { ltr.hidden=true; }
        btn.setAttribute("aria-pressed", on?"true":"false");
      });
    }
    function updateCheckLabel(){
      var n=Object.keys(answers).length;
      checkBtn.textContent=(n>0&&n<TOTAL)?("Проверить · "+n+"/"+TOTAL):"Проверить";
    }

    cards.forEach(function(card,i){
      card.addEventListener("click", function(){
        selected=(selected===i)?null:i;
        paintCards(); paintOptions();
      });
    });

    opts.forEach(function(btn){
      btn.setAttribute("aria-pressed","false");
      btn.addEventListener("click", function(){
        if (selected===null){
          checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
          return;
        }
        var person=btn.getAttribute("data-person");
        if (answers[selected]===person){
          delete answers[selected];
          cards[selected].classList.remove("answered","correct","wrong");
          resultEl.textContent=""; resultEl.className="result";
          paintCards(); paintOptions(); updateCheckLabel(); return;
        }
        Object.keys(answers).forEach(function(k){
          if (answers[k]===person){
            delete answers[k];
            cards[parseInt(k,10)].classList.remove("answered","correct","wrong");
          }
        });
        answers[selected]=person;
        cards[selected].classList.add("answered");
        cards[selected].classList.remove("correct","wrong");
        resultEl.textContent=""; resultEl.className="result";
        paintCards(); paintOptions(); updateCheckLabel();
        if (Object.keys(answers).length<TOTAL){
          for (var k=1;k<=TOTAL;k++){
            var nx=(selected+k)%TOTAL;
            if (answers[nx]===undefined){
              selected=nx;
              (function(t){ setTimeout(function(){ scrollToCard(t); paintCards(); paintOptions(); },260); })(nx);
              break;
            }
          }
        }
      });
    });

    var raf=null;
    carousel.addEventListener("scroll", function(){
      if (raf) return;
      raf=requestAnimationFrame(function(){
        raf=null;
        current=clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1);
        dots.forEach(function(d,n){ d.classList.toggle("active", n===current); });
      });
    }, {passive:true});

    checkBtn.addEventListener("click", function(){
      if (Object.keys(answers).length<TOTAL){
        checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
        resultEl.textContent="Ответьте на все ситуации"; resultEl.className="result warn"; return;
      }
      var correct=0;
      cards.forEach(function(card,i){
        var ok=answers[i]===SITUATIONS[i].answer; if (ok) correct++;
        card.classList.toggle("correct", ok); card.classList.toggle("wrong", !ok);
      });
      resultEl.textContent=(correct===TOTAL)?"Отлично! Все ответы верны 🎉":("Верно: "+correct+" из "+TOTAL);
      resultEl.className="result "+(correct===TOTAL?"ok":"warn");
    });

    return { refresh:function(){ current=clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1); dots.forEach(function(d,n){ d.classList.toggle("active",n===current); }); paintCards(); paintOptions(); } };
  }

    var dotsWrap = root.querySelector(".dots");
    var optsWrap = root.querySelector(".options");
    var checkBtn = root.querySelector(".check");
    var resultEl = root.querySelector(".result");
    var answers={}, current=0;

    carousel.innerHTML = SITUATIONS.map(function(s,i){

    var cards=[].slice.call(carousel.querySelectorAll(".card"));

    function step(){

    function paintOptions(){

    }
    function updateCheckLabel(){

      checkBtn.textContent=(n>0&&n<TOTAL)?("Проверить · "+n+"/"+TOTAL):"Проверить";
    }

    opts.forEach(function(btn){
      btn.setAttribute("aria-pressed","false");
      btn.addEventListener("click", function(){
        var person=btn.getAttribute("data-person");
        if (answers[current]===person){
          delete answers[current];
          cards[current].classList.remove("answered","correct","wrong");
          resultEl.textContent=""; resultEl.className="result";
          paintOptions(); updateCheckLabel(); return;
        }
        Object.keys(answers).forEach(function(k){

    }, {passive:true});

    checkBtn.addEventListener("click", function(){
      if (Object.keys(answers).length<TOTAL){
        checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
        resultEl.textContent="Ответьте на все ситуации"; resultEl.className="result warn"; return;
      }
      var correct=0;
      cards.forEach(function(card,i){
        var ok=answers[i]===SITUATIONS[i].answer; if (ok) correct++;
        card.classList.toggle("correct", ok); card.classList.toggle("wrong", !ok);

  /* ---------------- INTERFACE 4: list + dropdown ---------------- */
  function initScreen4(root){
    var qlist   = root.querySelector(".qlist");
    var checkBtn= root.querySelector(".check");
    var resultEl= root.querySelector(".result");
    var answers={};

    qlist.innerHTML = SITUATIONS.map(function(s,i){
      return '<div class="qitem" data-index="'+i+'">'
        + '<div class="qcard">'
        +   '<span class="glyph2">'+s.icon+'<span class="badge2">'+s.letter+'</span></span>'
        +   '<span class="phrase2">'+s.text+'</span>'
        + '</div>'
        + '<div class="dd">'
        +   '<button class="dd-trigger placeholder" type="button">'
        +     '<span class="dd-val">Выберите, кто это делал</span>'
        +     '<svg class="chev2" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>'
        +   '</button>'
        +   '<div class="dd-panel"><div class="dd-panel-inner"></div></div>'
        + '</div></div>';
    }).join("");

    var items=[].slice.call(qlist.querySelectorAll(".qitem"));

    function closeAll(except){
      items.forEach(function(it,j){ if (j!==except) it.querySelector(".dd").classList.remove("open"); });
    }
    function updateCheckLabel(){
      var n=Object.keys(answers).length;
      checkBtn.textContent=(n>0&&n<TOTAL)?("Проверить · "+n+"/"+TOTAL):"Проверить";
    }
    function refreshDropdowns(){
      items.forEach(function(item,i){
        var inner=item.querySelector(".dd-panel-inner");
        var usedByOthers={};
        Object.keys(answers).forEach(function(k){
          if (parseInt(k,10)!==i) usedByOthers[answers[k]]=true;
        });
        var available=PEOPLE.filter(function(p){ return !usedByOthers[p]; });
        inner.innerHTML=available.map(function(p){
          return '<button class="dd-opt'+(answers[i]===p?' sel':'')+'" type="button" data-person="'+p+'">'+p+'</button>';
        }).join("");
        [].slice.call(inner.querySelectorAll(".dd-opt")).forEach(function(o){
          o.addEventListener("click", function(){
            var dd=item.querySelector(".dd");
            var trigger=item.querySelector(".dd-trigger");
            var val=item.querySelector(".dd-val");
            answers[i]=o.getAttribute("data-person");
            val.textContent=answers[i];
            trigger.classList.remove("placeholder");
            dd.classList.remove("open");
            item.classList.remove("correct","wrong");
            resultEl.textContent=""; resultEl.className="result";
            updateCheckLabel();
            refreshDropdowns();
          });
        });
      });
    }

    items.forEach(function(item,i){
      var dd=item.querySelector(".dd");
      var trigger=item.querySelector(".dd-trigger");
      trigger.addEventListener("click", function(e){
        e.stopPropagation();
        var willOpen=!dd.classList.contains("open");
        closeAll(i);
        dd.classList.toggle("open", willOpen);
      });
    });

    document.addEventListener("click", function(e){
      if (root.classList.contains("active") && !e.target.closest(".dd")) closeAll(-1);
    });

    checkBtn.addEventListener("click", function(){
      if (Object.keys(answers).length<TOTAL){
        checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
        resultEl.textContent="Заполните все ситуации"; resultEl.className="result warn"; return;
      }
      var correct=0;
      items.forEach(function(item,i){
        var ok=answers[i]===SITUATIONS[i].answer; if (ok) correct++;
        item.classList.toggle("correct", ok); item.classList.toggle("wrong", !ok);
      });
      resultEl.textContent=(correct===TOTAL)?"Отлично! Все ответы верны 🎉":("Верно: "+correct+" из "+TOTAL);
      resultEl.className="result "+(correct===TOTAL?"ok":"warn");
    });

    refreshDropdowns();
    return { refresh:function(){} };
  }

  /* ---------------- navigation ---------------- */
  var screen1El=document.getElementById("screen1");
  var screen2El=document.getElementById("screen2");
  var screen3El=document.getElementById("screen3");
  var screen4El=document.getElementById("screen4");
  var s1=initScreen1(screen1El);
  var s2=initScreen2(screen2El);
  var s3=initScreen3(screen3El);
  var s4=initScreen4(screen4El);
  players.push(initPlayer(screen1El), initPlayer(screen2El), initPlayer(screen3El), initPlayer(screen4El));

  function showScreen(id){
    stopAllPlayers();
    [].slice.call(document.querySelectorAll(".screen")).forEach(function(s){ s.classList.remove("active"); });
    var el=document.getElementById(id);
    el.classList.add("active");
    var sc=el.querySelector(".scroll"); if (sc) sc.scrollTop=0;
    if (id==="screen1") s1.refresh();
    if (id==="screen2") s2.refresh();
    if (id==="screen3") s3.refresh();
  }

  [].slice.call(document.querySelectorAll("[data-nav]")).forEach(function(btn){
    btn.addEventListener("click", function(){ showScreen(btn.getAttribute("data-nav")); });
  });
})();
