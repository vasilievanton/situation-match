<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Что происходило — упражнение</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;
    --ink:#16151f;
    --ink-2:#5a5a6b;
    --muted:#a3a3b0;
    --surface-2:#f3f2f7;
    --surface-3:#e6e4ee;
    --line:rgba(22,21,40,.07);
    --accent:#6c4df2;
    --accent-2:#9a7bff;
    --accent-soft:rgba(108,77,242,.14);
    --play:#ff2d55;
    --play-2:#ff5d7c;
    --ok:#16b46b;
    --err:#f0445b;
    --r-card:26px;
    --r-btn:18px;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:"Onest",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:var(--ink);
    background:radial-gradient(120% 80% at 50% 0%, #efeaff 0%, #f6f4fb 45%, #eef0f8 100%);
    min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  .app{
    position:relative;max-width:440px;margin:0 auto;min-height:100dvh;
    background:var(--bg);display:flex;flex-direction:column;overflow:hidden;
    padding-top:env(safe-area-inset-top);
  }
  @media (min-width:520px){
    body{padding:28px 0;}
    .app{
      min-height:auto;height:calc(100dvh - 56px);border-radius:34px;
      box-shadow:0 40px 90px -40px rgba(40,30,90,.45), 0 0 0 1px rgba(22,21,40,.04);
    }
  }

  .screen{display:none;flex-direction:column;flex:1;min-height:0;}
  .screen.active{display:flex;animation:fade .3s both;}
  @keyframes fade{from{opacity:0;}to{opacity:1;}}

  .scroll{
    flex:1;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:8px;
  }

  /* ---------- top bar ---------- */
  .topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:14px 14px 4px;}
  .back{
    justify-self:start;display:inline-flex;align-items:center;gap:3px;
    border:none;background:transparent;cursor:pointer;
    color:var(--accent);font-family:inherit;font-weight:600;font-size:15px;
    padding:7px 9px;border-radius:11px;
  }
  .back:active{background:var(--accent-soft);}
  .back svg{width:19px;height:19px;}
  .tb-title{justify-self:center;font-weight:700;font-size:15px;color:var(--ink-2);}

  /* ---------- chooser ---------- */
  .chooser .scroll{padding:0 20px;}
  .lead{padding:40px 4px 4px;}
  .lead h1{margin:0 0 8px;font-size:28px;font-weight:800;letter-spacing:-.02em;}
  .lead p{margin:0 0 26px;color:var(--ink-2);font-size:15px;line-height:1.5;}
  .pick{display:flex;flex-direction:column;gap:16px;}
  .pick-card{
    display:flex;align-items:center;gap:16px;text-align:left;
    border:1px solid var(--line);background:#fff;border-radius:24px;
    padding:20px;cursor:pointer;font-family:inherit;
    box-shadow:0 18px 38px -24px rgba(50,35,110,.34);
    transition:transform .14s ease, box-shadow .2s ease, border-color .2s ease;
  }
  .pick-card:active{transform:scale(.985);}
  .pick-card:hover{border-color:rgba(108,77,242,.35);}
  .mini{flex:0 0 auto;width:64px;height:64px;border-radius:18px;background:var(--accent-soft);display:grid;place-items:center;}
  .mini span{font-size:22px;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--accent-2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .pc-body{flex:1;min-width:0;}
  .pc-title{font-weight:800;font-size:18px;color:var(--ink);margin-bottom:4px;}
  .pc-desc{font-size:13.5px;color:var(--ink-2);line-height:1.45;}
  .chev{flex:0 0 auto;color:var(--muted);}
  .chev svg{width:22px;height:22px;display:block;}

  /* ---------- audio player ---------- */
  .player{display:flex;align-items:center;gap:15px;padding:18px 20px 10px;}
  .play{
    flex:0 0 auto;width:60px;height:60px;border:none;border-radius:50%;
    background:linear-gradient(135deg,var(--play-2),var(--play));
    color:#fff;cursor:pointer;display:grid;place-items:center;
    box-shadow:0 14px 26px -10px rgba(255,45,85,.55);transition:transform .14s ease;
  }
  .play:active{transform:scale(.93);}
  .play svg{width:24px;height:24px;display:block;}
  .play .ic-pause{display:none;}
  .play.is-playing .ic-play{display:none;}
  .play.is-playing .ic-pause{display:block;}
  .wave{flex:1;display:flex;align-items:center;gap:3px;height:40px;}
  .wave .bar{flex:1;min-width:2px;border-radius:3px;background:var(--surface-3);height:34%;transform-origin:center;transition:background .25s ease;}
  .wave .bar.played{background:var(--accent);}
  .wave.is-playing .bar{animation:eq .85s ease-in-out infinite;}
  @keyframes eq{0%,100%{transform:scaleY(.55);}50%{transform:scaleY(1);}}
  .time{flex:0 0 auto;font-weight:600;font-size:14px;color:var(--muted);min-width:40px;text-align:right;font-variant-numeric:tabular-nums;}

  /* ---------- section title ---------- */
  .title{margin:18px 0 16px;text-align:center;font-size:25px;font-weight:800;letter-spacing:-.01em;}
  .block{animation:rise .5s both;}
  .block.b1{animation-delay:.06s;}
  .block.b2{animation-delay:.12s;}

  /* ---------- CAROUSEL (screens 2, 3, 4) ---------- */
  .carousel{
    display:flex;gap:14px;overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;scroll-padding-left:20px;
    padding:4px 20px 6px;scrollbar-width:none;
  }
  .carousel::-webkit-scrollbar{display:none;}
  .card{
    position:relative;flex:0 0 calc(100% - 58px);scroll-snap-align:start;
    background:#fff;border:1px solid var(--line);border-radius:var(--r-card);
    padding:30px 20px 26px;min-height:218px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    box-shadow:0 16px 36px -20px rgba(50,35,110,.3);
    transition:outline-color .25s ease;outline:2px solid transparent;outline-offset:-2px;
  }
  .card.answered{outline-color:var(--accent);}
  .card.correct{outline-color:var(--ok);}
  .card.wrong{outline-color:var(--err);}
  .card.is-active{background:rgba(108,77,242,.05);}
  .badge{
    position:absolute;top:16px;left:16px;width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    color:#fff;font-weight:800;font-size:16px;display:grid;place-items:center;
    box-shadow:0 8px 16px -6px var(--accent-soft);
  }
  .badge .tick{
    position:absolute;right:-5px;bottom:-5px;width:18px;height:18px;border-radius:50%;
    background:var(--ok);color:#fff;display:none;place-items:center;border:2px solid #fff;font-size:10px;
  }
  .card.answered .badge .tick{display:grid;}
  .glyph{width:90px;height:90px;border-radius:24px;background:var(--surface-2);display:grid;place-items:center;font-size:44px;line-height:1;}
  .phrase{font-size:21px;font-weight:700;text-align:center;letter-spacing:-.01em;}

  .dots{display:flex;justify-content:center;gap:8px;margin-top:18px;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--surface-3);border:none;padding:0;cursor:pointer;transition:width .28s ease, background .28s ease;}
  .dot.active{width:24px;border-radius:999px;background:var(--accent);}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px;}
  .opt{
    appearance:none;border:1px solid var(--line);background:var(--surface-2);color:var(--ink);
    font-family:inherit;font-weight:600;font-size:16px;line-height:1.25;
    padding:16px 12px;border-radius:var(--r-btn);min-height:58px;cursor:pointer;
    transition:transform .12s ease, background .22s ease, color .22s ease, box-shadow .22s ease, border-color .22s ease;
  }
  .opt:active{transform:scale(.97);}
  .opt.is-selected{
    background:linear-gradient(135deg,var(--accent-2),var(--accent));color:#fff;border-color:transparent;
    box-shadow:0 14px 26px -12px var(--accent-soft);
  }

  /* ---------- SCREEN 2: flip cards (6-9) ---------- */
  .flip-wrap{
    flex:0 0 calc(100% - 58px);scroll-snap-align:start;
    perspective:1000px;min-height:218px;
  }
  .flip-inner{
    position:relative;width:100%;min-height:218px;
    transform-style:preserve-3d;transition:transform .5s ease;
  }
  .flip-wrap.flipped .flip-inner{transform:rotateY(180deg);}
  .flip-front,.flip-back{
    position:absolute;inset:0;min-height:218px;
    backface-visibility:hidden;-webkit-backface-visibility:hidden;
    background:#fff;border:1px solid var(--line);border-radius:var(--r-card);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:30px 20px 20px;gap:14px;
    box-shadow:0 16px 36px -20px rgba(50,35,110,.3);
    outline:2px solid transparent;outline-offset:-2px;
    transition:outline-color .25s ease;
    cursor:pointer;
  }
  .flip-back{transform:rotateY(180deg);}
  .flip-wrap.answered .flip-front,.flip-wrap.answered .flip-back{outline-color:var(--accent);}
  .flip-wrap.correct .flip-front,.flip-wrap.correct .flip-back{outline-color:var(--ok);}
  .flip-wrap.wrong .flip-front,.flip-wrap.wrong .flip-back{outline-color:var(--err);}
  .flip-wrap.answered .flip-front .badge .tick{display:grid;}
  .flip-hint{font-size:12px;color:var(--muted);font-weight:500;}
  .flip-desc{font-size:14px;line-height:1.6;color:var(--ink-2);text-align:center;}

  /* ---------- SCREEN 1: matching game (3-5) ---------- */
  .match-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px;}
  .match-card{
    position:relative;background:#fff;border:1px solid var(--line);border-radius:18px;
    padding:28px 6px 12px;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:6px;min-height:90px;
    box-shadow:0 8px 20px -14px rgba(50,35,110,.3);
    transition:outline-color .2s ease, transform .12s ease, background .2s ease;
    outline:2px solid transparent;outline-offset:-2px;
  }
  .match-card:active{transform:scale(.96);}
  .match-card.is-active{outline-color:var(--accent);background:rgba(108,77,242,.05);}
  .match-card.answered{outline-color:var(--accent);}
  .match-card.is-selected{background:linear-gradient(135deg,var(--accent-2),var(--accent));border-color:transparent;box-shadow:0 10px 22px -10px var(--accent-soft);}
  .match-card.correct{outline-color:var(--ok);}
  .match-card.wrong{outline-color:var(--err);}
  .match-card.answered .sit-ltr .sit-tick{display:grid;}
  .match-emoji{font-size:34px;line-height:1;}
  .match-emoji.sm{font-size:26px;}
  .match-label{font-size:11.5px;font-weight:700;text-align:center;color:var(--ink-2);line-height:1.25;}
  .match-card.is-selected .match-label{color:rgba(255,255,255,.85);}
  /* 5th situation card: center it in 3-col grid */
  .match-grid .match-card:last-child:nth-child(3n+2){grid-column:2;}
  .sit-ltr{
    position:absolute;top:8px;left:9px;width:22px;height:22px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    color:#fff;font-weight:800;font-size:11px;display:grid;place-items:center;
  }
  .sit-tick{
    position:absolute;right:-4px;bottom:-4px;width:14px;height:14px;border-radius:50%;
    background:var(--ok);color:#fff;display:none;place-items:center;border:2px solid #fff;font-size:8px;
  }
  .match-sep{height:1px;background:var(--line);margin:16px 20px 4px;}

  /* ---------- footer / check ---------- */
  .footer{flex:0 0 auto;padding:14px 20px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(to top,#fff 62%,rgba(255,255,255,0));}
  .check{
    width:100%;border:none;cursor:pointer;border-radius:var(--r-btn);padding:18px;
    font-family:inherit;font-weight:800;font-size:18px;color:#fff;
    background:linear-gradient(135deg,var(--accent-2),var(--accent));
    box-shadow:0 18px 32px -14px var(--accent-soft);transition:transform .12s ease;
  }
  .check:active{transform:scale(.985);}
  .check.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-7px);}40%,80%{transform:translateX(7px);}}
  .result{text-align:center;font-weight:600;font-size:14px;margin-top:11px;min-height:18px;color:var(--muted);}
  .result.ok{color:var(--ok);}
  .result.warn{color:var(--play);}

  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
  <main class="app">

    <!-- ============ CHOOSER ============ -->
    <section class="screen chooser active" id="chooser">
      <div class="scroll">
        <div class="lead">
          <h1>Выберите группу</h1>
          <p>Выберите возрастную группу — упражнение откроется в подходящем формате.</p>
        </div>
        <div class="pick">
          <button class="pick-card" type="button" data-nav="screen1">
            <span class="mini"><span>3–5</span></span>
            <span class="pc-body">
              <span class="pc-title">3–5 лет</span>
              <span class="pc-desc">Сопоставь картинки — нажми на ситуацию, затем на человека</span>
            </span>
            <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
          </button>
          <button class="pick-card" type="button" data-nav="screen2">
            <span class="mini"><span>6–9</span></span>
            <span class="pc-body">
              <span class="pc-title">6–9 лет</span>
              <span class="pc-desc">Переверни карточку, прочитай описание · выбери кто это</span>
            </span>
            <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
          </button>
          <button class="pick-card" type="button" data-nav="screen3">
            <span class="mini"><span>10–12</span></span>
            <span class="pc-body">
              <span class="pc-title">10–12 лет</span>
              <span class="pc-desc">Свайп по ситуациям · выбери из вариантов</span>
            </span>
            <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
          </button>
          <button class="pick-card" type="button" data-nav="screen4">
            <span class="mini"><span>13–17</span></span>
            <span class="pc-body">
              <span class="pc-title">13–17 лет</span>
              <span class="pc-desc">Свайп по ситуациям · выбери из вариантов</span>
            </span>
            <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span>
          </button>
        </div>
      </div>
    </section>

    <!-- ============ SCREEN 1: 3–5 лет (matching game) ============ -->
    <section class="screen" id="screen1">
      <div class="topbar">
        <button class="back" type="button" data-nav="chooser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Группы
        </button>
        <span class="tb-title">3–5 лет</span>
      </div>
      <div class="scroll">
        <section class="player">
          <button class="play" aria-label="Воспроизвести">
            <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.74l-11-6.5A1 1 0 0 0 8 5.5Z"/></svg>
            <svg class="ic-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.4"/><rect x="13.5" y="5" width="4" height="14" rx="1.4"/></svg>
          </button>
          <div class="wave" aria-hidden="true"></div>
          <span class="time">0:00</span>
        </section>
        <section class="block b1">
          <h2 class="title">Что происходило</h2>
          <div class="match-grid" id="sit-grid"></div>
        </section>
        <div class="match-sep"></div>
        <section class="block b2">
          <h2 class="title">Кто это делал</h2>
          <div class="match-grid" id="per-grid"></div>
        </section>
      </div>
      <div class="footer">
        <button class="check" type="button">Проверить</button>
        <div class="result"></div>
      </div>
    </section>

    <!-- ============ SCREEN 2: 6–9 лет (flip cards) ============ -->
    <section class="screen" id="screen2">
      <div class="topbar">
        <button class="back" type="button" data-nav="chooser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Группы
        </button>
        <span class="tb-title">6–9 лет</span>
      </div>
      <div class="scroll">
        <section class="player">
          <button class="play" aria-label="Воспроизвести">
            <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.74l-11-6.5A1 1 0 0 0 8 5.5Z"/></svg>
            <svg class="ic-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.4"/><rect x="13.5" y="5" width="4" height="14" rx="1.4"/></svg>
          </button>
          <div class="wave" aria-hidden="true"></div>
          <span class="time">0:00</span>
        </section>
        <section class="block b1">
          <h2 class="title">Что происходило</h2>
          <div class="carousel"></div>
          <div class="dots"></div>
        </section>
        <section class="block b2">
          <h2 class="title">Варианты</h2>
          <div class="options"></div>
        </section>
      </div>
      <div class="footer">
        <button class="check" type="button">Проверить</button>
        <div class="result"></div>
      </div>
    </section>

    <!-- ============ SCREEN 3: 10–12 лет ============ -->
    <section class="screen" id="screen3">
      <div class="topbar">
        <button class="back" type="button" data-nav="chooser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Группы
        </button>
        <span class="tb-title">10–12 лет</span>
      </div>
      <div class="scroll">
        <section class="player">
          <button class="play" aria-label="Воспроизвести">
            <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.74l-11-6.5A1 1 0 0 0 8 5.5Z"/></svg>
            <svg class="ic-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.4"/><rect x="13.5" y="5" width="4" height="14" rx="1.4"/></svg>
          </button>
          <div class="wave" aria-hidden="true"></div>
          <span class="time">0:00</span>
        </section>
        <section class="block b1">
          <h2 class="title">Что происходило</h2>
          <div class="carousel"></div>
          <div class="dots"></div>
        </section>
        <section class="block b2">
          <h2 class="title">Варианты</h2>
          <div class="options"></div>
        </section>
      </div>
      <div class="footer">
        <button class="check" type="button">Проверить</button>
        <div class="result"></div>
      </div>
    </section>

    <!-- ============ SCREEN 4: 13–17 лет ============ -->
    <section class="screen" id="screen4">
      <div class="topbar">
        <button class="back" type="button" data-nav="chooser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          Группы
        </button>
        <span class="tb-title">13–17 лет</span>
      </div>
      <div class="scroll">
        <section class="player">
          <button class="play" aria-label="Воспроизвести">
            <svg class="ic-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.5v13a1 1 0 0 0 1.5.87l11-6.5a1 1 0 0 0 0-1.74l-11-6.5A1 1 0 0 0 8 5.5Z"/></svg>
            <svg class="ic-pause" viewBox="0 0 24 24" fill="currentColor"><rect x="6.5" y="5" width="4" height="14" rx="1.4"/><rect x="13.5" y="5" width="4" height="14" rx="1.4"/></svg>
          </button>
          <div class="wave" aria-hidden="true"></div>
          <span class="time">0:00</span>
        </section>
        <section class="block b1">
          <h2 class="title">Что происходило</h2>
          <div class="carousel"></div>
          <div class="dots"></div>
        </section>
        <section class="block b2">
          <h2 class="title">Варианты</h2>
          <div class="options"></div>
        </section>
      </div>
      <div class="footer">
        <button class="check" type="button">Проверить</button>
        <div class="result"></div>
      </div>
    </section>

  </main>

<script>
(function(){
  "use strict";

  /* =========================================================
     ДАННЫЕ
     ========================================================= */
  var SITUATIONS = [
    { letter:"A", icon:"📋", text:"Читала список",             answer:"Ника" },
    { letter:"B", icon:"🎉", text:"Отнёс гирлянды в гостиную", answer:"Тёма" },
    { letter:"C", icon:"🥤", text:"Уронил бумажные стаканчики", answer:"Марк" },
    { letter:"D", icon:"🪑", text:"Отнёс стул в багажник",      answer:"Официант" },
    { letter:"E", icon:"🍽️", text:"Накрывала на стол",          answer:"Девушка с фотоаппаратом" }
  ];

  var SITUATIONS_6_9 = [
    { letter:"A", icon:"📋", text:"Читала список",
      desc:"Стояла у стены с листочком в руках и читала вслух пункт за пунктом, иногда кивая и делая пометки карандашом.",
      answer:"Ника" },
    { letter:"B", icon:"🎉", text:"Отнёс гирлянды в гостиную",
      desc:"Взял несколько коробок с гирляндами и аккуратно отнёс их в гостиную, начав развешивать по стенам и углам комнаты.",
      answer:"Тёма" },
    { letter:"C", icon:"🥤", text:"Уронил бумажные стаканчики",
      desc:"Нёс высокую стопку бумажных стаканчиков, но зацепился за ковёр и выронил их — они рассыпались по всему полу.",
      answer:"Марк" },
    { letter:"D", icon:"🪑", text:"Отнёс стул в багажник",
      desc:"Поднял лёгкий складной стул и понёс через двор к припаркованной машине, осторожно загрузив его в открытый багажник.",
      answer:"Официант" },
    { letter:"E", icon:"🍽️", text:"Накрывала на стол",
      desc:"Неторопливо расставляла тарелки и раскладывала приборы, иногда останавливаясь, чтобы сделать снимок сервировки.",
      answer:"Девушка с фотоаппаратом" }
  ];

  var PEOPLE = ["Марк","Официант","Ника","Лера","Тёма","Девушка с фотоаппаратом"];

  var PEOPLE_EMOJI = {
    "Марк":"👦","Официант":"🤵","Ника":"👧",
    "Лера":"👩","Тёма":"🧒","Девушка с фотоаппаратом":"📷"
  };

  var TOTAL = SITUATIONS.length;

  function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }
  function fmt(s){ var m=Math.floor(s/60),ss=s%60; return m+":"+(ss<10?"0":"")+ss; }

  /* ---------------- audio player ---------------- */
  var players=[];
  function initPlayer(screen){
    var playBtn=screen.querySelector(".play");
    var wave=screen.querySelector(".wave");
    var timeEl=screen.querySelector(".time");
    var BARS=42,bars=[];
    for(var i=0;i<BARS;i++){
      var b=document.createElement("span"); b.className="bar";
      var h=24+Math.round((Math.sin(i*1.7)*.5+.5)*60+(i%5)*4);
      b.style.height=Math.min(100,h)+"%";
      b.style.animationDelay=(i*.035).toFixed(2)+"s";
      wave.appendChild(b); bars.push(b);
    }
    var DURATION=120,cur=0,timer=null;
    function paint(){
      var played=Math.round(cur/DURATION*BARS);
      for(var i=0;i<BARS;i++) bars[i].classList.toggle("played",i<played);
      timeEl.textContent=fmt(cur);
    }
    function stop(){ clearInterval(timer); timer=null; playBtn.classList.remove("is-playing"); wave.classList.remove("is-playing"); playBtn.setAttribute("aria-label","Воспроизвести"); }
    playBtn.addEventListener("click",function(){
      if(timer){ stop(); return; }
      if(cur>=DURATION) cur=0;
      playBtn.classList.add("is-playing"); wave.classList.add("is-playing"); playBtn.setAttribute("aria-label","Пауза");
      timer=setInterval(function(){ cur++; paint(); if(cur>=DURATION){ paint(); stop(); cur=0; setTimeout(paint,400); } },1000);
    });
    paint();
    return { stop:stop };
  }
  function stopAllPlayers(){ players.forEach(function(p){ p.stop(); }); }

  /* ============================================================
     SCREEN 1 — 3–5 лет: matching game
     ============================================================ */
  function initScreen1(root){
    var sitGrid=root.querySelector("#sit-grid");
    var perGrid=root.querySelector("#per-grid");
    var checkBtn=root.querySelector(".check");
    var resultEl=root.querySelector(".result");
    var answers={}, selected=null;

    sitGrid.innerHTML=SITUATIONS.map(function(s,i){
      return '<article class="match-card" data-index="'+i+'">'
        +'<span class="sit-ltr">'+s.letter+'<span class="sit-tick">✓</span></span>'
        +'<span class="match-emoji">'+s.icon+'</span>'
        +'</article>';
    }).join("");
    var sitCards=[].slice.call(sitGrid.querySelectorAll(".match-card"));

    perGrid.innerHTML=PEOPLE.map(function(p){
      var em=PEOPLE_EMOJI[p]||"👤";
      var label=p.length>8?p.split(" ")[0]:p;
      return '<button class="match-card" type="button" data-person="'+p+'">'
        +'<span class="match-emoji sm">'+em+'</span>'
        +'<span class="match-label">'+label+'</span>'
        +'</button>';
    }).join("");
    var perCards=[].slice.call(perGrid.querySelectorAll(".match-card"));

    function paintSit(){
      sitCards.forEach(function(c,i){
        c.classList.toggle("is-active", i===selected);
        c.classList.toggle("answered", answers[i]!==undefined);
      });
    }
    function paintPer(){
      perCards.forEach(function(c){
        var p=c.getAttribute("data-person");
        c.classList.toggle("is-selected", selected!==null && answers[selected]===p);
      });
    }
    function updateCheckLabel(){
      var n=Object.keys(answers).length;
      checkBtn.textContent=(n>0&&n<TOTAL)?("Проверить · "+n+"/"+TOTAL):"Проверить";
    }

    sitCards.forEach(function(c,i){
      c.addEventListener("click",function(){
        selected=(selected===i)?null:i;
        paintSit(); paintPer();
      });
    });

    perCards.forEach(function(c){
      c.addEventListener("click",function(){
        if(selected===null){
          checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
          return;
        }
        var p=c.getAttribute("data-person");
        if(answers[selected]===p){
          delete answers[selected];
          sitCards[selected].classList.remove("correct","wrong");
          resultEl.textContent=""; resultEl.className="result";
          paintSit(); paintPer(); updateCheckLabel(); return;
        }
        Object.keys(answers).forEach(function(k){
          if(answers[k]===p){ delete answers[k]; sitCards[parseInt(k,10)].classList.remove("correct","wrong"); }
        });
        answers[selected]=p;
        sitCards[selected].classList.remove("correct","wrong");
        resultEl.textContent=""; resultEl.className="result";
        paintSit(); paintPer(); updateCheckLabel();
        if(Object.keys(answers).length<TOTAL){
          for(var k=1;k<=TOTAL;k++){
            var nx=(selected+k)%TOTAL;
            if(answers[nx]===undefined){ selected=nx; paintSit(); paintPer(); break; }
          }
        }
      });
    });

    checkBtn.addEventListener("click",function(){
      if(Object.keys(answers).length<TOTAL){
        checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
        resultEl.textContent="Сопоставьте все карточки"; resultEl.className="result warn"; return;
      }
      var correct=0;
      sitCards.forEach(function(c,i){
        var ok=answers[i]===SITUATIONS[i].answer; if(ok) correct++;
        c.classList.toggle("correct",ok); c.classList.toggle("wrong",!ok);
      });
      resultEl.textContent=(correct===TOTAL)?"Отлично! Все ответы верны 🎉":("Верно: "+correct+" из "+TOTAL);
      resultEl.className="result "+(correct===TOTAL?"ok":"warn");
    });

    return { refresh:function(){ paintSit(); paintPer(); } };
  }

  /* ============================================================
     SCREEN 2 — 6–9 лет: flip cards + options
     ============================================================ */
  function initScreen2(root){
    var carousel=root.querySelector(".carousel");
    var dotsWrap=root.querySelector(".dots");
    var optsWrap=root.querySelector(".options");
    var checkBtn=root.querySelector(".check");
    var resultEl=root.querySelector(".result");
    var answers={}, current=0;

    carousel.innerHTML=SITUATIONS_6_9.map(function(s,i){
      return '<div class="flip-wrap" data-index="'+i+'">'
        +'<div class="flip-inner">'
        +'<div class="flip-front">'
        +'<span class="badge">'+s.letter+'<span class="tick">✓</span></span>'
        +'<span class="glyph">'+s.icon+'</span>'
        +'<span class="phrase">'+s.text+'</span>'
        +'<span class="flip-hint">Нажми, чтобы узнать больше →</span>'
        +'</div>'
        +'<div class="flip-back">'
        +'<span class="badge">'+s.letter+'<span class="tick">✓</span></span>'
        +'<p class="flip-desc">'+s.desc+'</p>'
        +'</div>'
        +'</div></div>';
    }).join("");
    var wraps=[].slice.call(carousel.querySelectorAll(".flip-wrap"));

    dotsWrap.innerHTML=SITUATIONS_6_9.map(function(s,i){
      return '<button class="dot'+(i===0?' active':'')+'" aria-label="Ситуация '+(i+1)+'"></button>';
    }).join("");
    var dots=[].slice.call(dotsWrap.querySelectorAll(".dot"));
    dots.forEach(function(dot,i){ dot.addEventListener("click",function(){ scrollToCard(i); }); });

    optsWrap.innerHTML=PEOPLE.map(function(p){
      return '<button class="opt" type="button" data-person="'+p+'">'+p+'</button>';
    }).join("");
    var opts=[].slice.call(optsWrap.querySelectorAll(".opt"));

    function step(){
      if(!wraps[0]) return 1;
      var gap=parseFloat(getComputedStyle(carousel).gap)||14;
      return (wraps[0].getBoundingClientRect().width||1)+gap;
    }
    function scrollToCard(i){ carousel.scrollTo({left:i*step(),behavior:"smooth"}); }
    function paintOptions(){
      var chosen=answers[current];
      opts.forEach(function(btn){
        var on=btn.getAttribute("data-person")===chosen;
        btn.classList.toggle("is-selected",on);
        btn.classList.remove("is-used");
        btn.setAttribute("aria-pressed",on?"true":"false");
      });
    }
    function setActive(i){
      if(i===current) return;
      wraps[current].classList.remove("flipped");
      current=i;
      dots.forEach(function(d,n){ d.classList.toggle("active",n===i); });
      paintOptions();
    }
    function updateCheckLabel(){
      var n=Object.keys(answers).length;
      checkBtn.textContent=(n>0&&n<TOTAL)?("Проверить · "+n+"/"+TOTAL):"Проверить";
    }

    wraps.forEach(function(wrap){
      wrap.addEventListener("click",function(){ wrap.classList.toggle("flipped"); });
    });

    opts.forEach(function(btn){
      btn.setAttribute("aria-pressed","false");
      btn.addEventListener("click",function(){
        var p=btn.getAttribute("data-person");
        if(answers[current]===p){
          delete answers[current];
          wraps[current].classList.remove("answered","correct","wrong");
          resultEl.textContent=""; resultEl.className="result";
          paintOptions(); updateCheckLabel(); return;
        }
        Object.keys(answers).forEach(function(k){
          if(answers[k]===p){ delete answers[k]; wraps[parseInt(k,10)].classList.remove("answered","correct","wrong"); }
        });
        answers[current]=p;
        wraps[current].classList.add("answered"); wraps[current].classList.remove("correct","wrong");
        resultEl.textContent=""; resultEl.className="result";
        paintOptions(); updateCheckLabel();
        if(Object.keys(answers).length<TOTAL){
          for(var k=1;k<=TOTAL;k++){
            var nx=(current+k)%TOTAL;
            if(answers[nx]===undefined){ (function(t){ setTimeout(function(){ scrollToCard(t); },260); })(nx); break; }
          }
        }
      });
    });

    var raf=null;
    carousel.addEventListener("scroll",function(){
      if(raf) return;
      raf=requestAnimationFrame(function(){
        raf=null;
        setActive(clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1));
      });
    },{passive:true});

    checkBtn.addEventListener("click",function(){
      if(Object.keys(answers).length<TOTAL){
        checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
        resultEl.textContent="Ответьте на все ситуации"; resultEl.className="result warn"; return;
      }
      var correct=0;
      wraps.forEach(function(w,i){
        var ok=answers[i]===SITUATIONS_6_9[i].answer; if(ok) correct++;
        w.classList.toggle("correct",ok); w.classList.toggle("wrong",!ok);
      });
      resultEl.textContent=(correct===TOTAL)?"Отлично! Все ответы верны 🎉":("Верно: "+correct+" из "+TOTAL);
      resultEl.className="result "+(correct===TOTAL?"ok":"warn");
    });

    return { refresh:function(){ current=clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1); dots.forEach(function(d,n){ d.classList.toggle("active",n===current); }); paintOptions(); } };
  }

  /* ============================================================
     SCREEN 3 & 4 — 10–12 и 13–17 лет: carousel + options
     ============================================================ */
  function initCarouselScreen(root){
    var carousel=root.querySelector(".carousel");
    var dotsWrap=root.querySelector(".dots");
    var optsWrap=root.querySelector(".options");
    var checkBtn=root.querySelector(".check");
    var resultEl=root.querySelector(".result");
    var answers={}, current=0;

    carousel.innerHTML=SITUATIONS.map(function(s,i){
      return '<article class="card" data-index="'+i+'">'
        +'<span class="badge">'+s.letter+'<span class="tick">✓</span></span>'
        +'<span class="glyph">'+s.icon+'</span>'
        +'<span class="phrase">'+s.text+'</span></article>';
    }).join("");
    var cards=[].slice.call(carousel.querySelectorAll(".card"));

    dotsWrap.innerHTML=SITUATIONS.map(function(s,i){
      return '<button class="dot'+(i===0?' active':'')+'" aria-label="Ситуация '+(i+1)+'"></button>';
    }).join("");
    var dots=[].slice.call(dotsWrap.querySelectorAll(".dot"));
    dots.forEach(function(dot,i){ dot.addEventListener("click",function(){ scrollToCard(i); }); });

    optsWrap.innerHTML=PEOPLE.map(function(p){
      return '<button class="opt" type="button" data-person="'+p+'">'+p+'</button>';
    }).join("");
    var opts=[].slice.call(optsWrap.querySelectorAll(".opt"));

    function step(){
      if(!cards[0]) return 1;
      var gap=parseFloat(getComputedStyle(carousel).gap)||14;
      return (cards[0].getBoundingClientRect().width||1)+gap;
    }
    function scrollToCard(i){ carousel.scrollTo({left:i*step(),behavior:"smooth"}); }
    function paintOptions(){
      var chosen=answers[current];
      opts.forEach(function(btn){
        var on=btn.getAttribute("data-person")===chosen;
        btn.classList.toggle("is-selected",on);
        btn.classList.remove("is-used");
        btn.setAttribute("aria-pressed",on?"true":"false");
      });
    }
    function setActive(i){
      if(i===current){ paintOptions(); return; }
      current=i;
      dots.forEach(function(d,n){ d.classList.toggle("active",n===i); });
      paintOptions();
    }
    function updateCheckLabel(){
      var n=Object.keys(answers).length;
      checkBtn.textContent=(n>0&&n<TOTAL)?("Проверить · "+n+"/"+TOTAL):"Проверить";
    }

    opts.forEach(function(btn){
      btn.setAttribute("aria-pressed","false");
      btn.addEventListener("click",function(){
        var p=btn.getAttribute("data-person");
        if(answers[current]===p){
          delete answers[current];
          cards[current].classList.remove("answered","correct","wrong");
          resultEl.textContent=""; resultEl.className="result";
          paintOptions(); updateCheckLabel(); return;
        }
        Object.keys(answers).forEach(function(k){
          if(answers[k]===p){ delete answers[k]; cards[parseInt(k,10)].classList.remove("answered","correct","wrong"); }
        });
        answers[current]=p;
        cards[current].classList.add("answered"); cards[current].classList.remove("correct","wrong");
        resultEl.textContent=""; resultEl.className="result";
        paintOptions(); updateCheckLabel();
        if(Object.keys(answers).length<TOTAL){
          for(var k=1;k<=TOTAL;k++){
            var nx=(current+k)%TOTAL;
            if(answers[nx]===undefined){ (function(t){ setTimeout(function(){ scrollToCard(t); },260); })(nx); break; }
          }
        }
      });
    });

    var raf=null;
    carousel.addEventListener("scroll",function(){
      if(raf) return;
      raf=requestAnimationFrame(function(){
        raf=null;
        setActive(clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1));
      });
    },{passive:true});

    checkBtn.addEventListener("click",function(){
      if(Object.keys(answers).length<TOTAL){
        checkBtn.classList.remove("shake"); void checkBtn.offsetWidth; checkBtn.classList.add("shake");
        resultEl.textContent="Ответьте на все ситуации"; resultEl.className="result warn"; return;
      }
      var correct=0;
      cards.forEach(function(c,i){
        var ok=answers[i]===SITUATIONS[i].answer; if(ok) correct++;
        c.classList.toggle("correct",ok); c.classList.toggle("wrong",!ok);
      });
      resultEl.textContent=(correct===TOTAL)?"Отлично! Все ответы верны 🎉":("Верно: "+correct+" из "+TOTAL);
      resultEl.className="result "+(correct===TOTAL?"ok":"warn");
    });

    return { refresh:function(){ setActive(clamp(Math.round(carousel.scrollLeft/step()),0,TOTAL-1)); paintOptions(); } };
  }

  /* ---------------- navigation ---------------- */
  var screen1El=document.getElementById("screen1");
  var screen2El=document.getElementById("screen2");
  var screen3El=document.getElementById("screen3");
  var screen4El=document.getElementById("screen4");
  var s1=initScreen1(screen1El);
  var s2=initScreen2(screen2El);
  var s3=initCarouselScreen(screen3El);
  var s4=initCarouselScreen(screen4El);
  players.push(initPlayer(screen1El),initPlayer(screen2El),initPlayer(screen3El),initPlayer(screen4El));

  function showScreen(id){
    stopAllPlayers();
    [].slice.call(document.querySelectorAll(".screen")).forEach(function(s){ s.classList.remove("active"); });
    var el=document.getElementById(id);
    el.classList.add("active");
    var sc=el.querySelector(".scroll"); if(sc) sc.scrollTop=0;
    if(id==="screen1") s1.refresh();
    if(id==="screen2") s2.refresh();
    if(id==="screen3") s3.refresh();
    if(id==="screen4") s4.refresh();
  }

  [].slice.call(document.querySelectorAll("[data-nav]")).forEach(function(btn){
    btn.addEventListener("click",function(){ showScreen(btn.getAttribute("data-nav")); });
  });
})();
</script>
</body>
</html>
